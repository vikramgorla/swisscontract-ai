name: Deploy to production (Docker)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'postcss.config.mjs'
      - 'proxy.ts'
      - 'Dockerfile'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vikramgorla/swisscontract-ai:prod
            ghcr.io/vikramgorla/swisscontract-ai:latest
          build-args: |
            NEXT_PUBLIC_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          INFOMANIAK_AI_TOKEN: ${{ secrets.INFOMANIAK_AI_TOKEN }}
          INFOMANIAK_PRODUCT_ID: ${{ secrets.INFOMANIAK_PRODUCT_ID }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key $USER@$HOST \
            INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            INFOMANIAK_PRODUCT_ID="$INFOMANIAK_PRODUCT_ID" \
            bash << 'ENDSSH'
          set -e
          IMAGE="ghcr.io/vikramgorla/swisscontract-ai:prod"

          docker pull $IMAGE

          docker stop swisscontract-prod 2>/dev/null || true
          docker rm swisscontract-prod 2>/dev/null || true

          docker run -d \
            --name swisscontract-prod \
            --restart unless-stopped \
            -p 3001:3000 \
            -e INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            -e INFOMANIAK_PRODUCT_ID="$INFOMANIAK_PRODUCT_ID" \
            -e NEXT_PUBLIC_ENV=production \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            $IMAGE

          sleep 8
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health --max-time 10 || echo "000")
          echo "Health check: HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1

          docker image prune -f
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://swisscontract.ai/api/health" --max-time 20)
          echo "swisscontract.ai → HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ Production health check passed"
