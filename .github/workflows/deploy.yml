name: Deploy

on:
  push:
    branches: [main, preprod]
    paths:
      - 'app/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'postcss.config.mjs'
      - 'proxy.ts'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    # Build runs ONLY on preprod push — produces a single image
    # Skips auto-bump commits to avoid infinite loop
    runs-on: ubuntu-latest
    if: "github.ref_name == 'preprod' && !startsWith(github.event.head_commit.message, 'chore: preprod') && !startsWith(github.event.head_commit.message, 'chore: start')"
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      new_version: ${{ steps.preversion.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump pre-release version
        id: preversion
        run: |
          CURRENT=$(jq -r .version package.json)
          # Only bump -beta.N versions — anything else is a release candidate, leave as-is
          if echo "$CURRENT" | grep -qE '\-beta\.[0-9]+$'; then
            BASE=$(echo "$CURRENT" | sed 's/-beta\.[0-9]*$//')
            N=$(echo "$CURRENT" | grep -oE '[0-9]+$')
            NEW_VERSION="${BASE}-beta.$((N + 1))"
            echo "Version: $CURRENT → $NEW_VERSION"
            jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            NEW_VERSION="$CURRENT"
            echo "Version: $CURRENT (release candidate — no bump)"
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit pre-release version
        if: steps.preversion.outputs.bumped == 'true'
        run: |
          VERSION="${{ steps.preversion.outputs.new_version }}"
          git config user.email "268332783+agent-lea[bot]@users.noreply.github.com"
          git config user.name "Agent Léa 🏔️"
          git add package.json
          git commit -m "chore: preprod ${VERSION}"
          git push origin preprod

      - name: Set image metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "Building image: ghcr.io/vikramgorla/swisscontract-ai:sha-${SHA_SHORT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vikramgorla/swisscontract-ai:preprod
            ghcr.io/vikramgorla/swisscontract-ai:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/vikramgorla/swisscontract-ai:${{ steps.preversion.outputs.new_version }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy-preprod:
    needs: build
    runs-on: ubuntu-latest
    environment: preprod
    if: "github.ref_name == 'preprod' && !startsWith(github.event.head_commit.message, 'chore: preprod') && !startsWith(github.event.head_commit.message, 'chore: start')"
    timeout-minutes: 15

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy preprod to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
          INFOMANIAK_AI_TOKEN: ${{ secrets.INFOMANIAK_AI_TOKEN }}
          INFOMANIAK_AI_PRODUCT_ID: ${{ secrets.INFOMANIAK_AI_PRODUCT_ID }}
          GITHUB_TOKEN_FOR_DOCKER: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SHA_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh "$USER@$HOST" \
            DOMAIN="$DOMAIN" \
            INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            GITHUB_TOKEN_FOR_DOCKER="$GITHUB_TOKEN_FOR_DOCKER" \
            GITHUB_ACTOR="$GITHUB_ACTOR" \
            SHA_TAG="$SHA_TAG" \
            bash << 'ENDSSH'
          set -e
          IMAGE="ghcr.io/vikramgorla/swisscontract-ai:${SHA_TAG}"

          echo "$GITHUB_TOKEN_FOR_DOCKER" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          docker pull "$IMAGE"

          docker stop swisscontract-preprod 2>/dev/null || true
          docker rm   swisscontract-preprod 2>/dev/null || true

          docker network create traefik-net 2>/dev/null || true

          docker run -d \
            --name swisscontract-preprod \
            --restart unless-stopped \
            --network traefik-net \
            -e INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            -e INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            -e APP_ENV=preprod \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.swisscontract-preprod.rule=Host(\`${DOMAIN}\`)" \
            --label "traefik.http.routers.swisscontract-preprod.entrypoints=websecure" \
            --label "traefik.http.routers.swisscontract-preprod.tls.certresolver=letsencrypt" \
            --label "traefik.http.routers.swisscontract-preprod.middlewares=inject-env-preprod" \
            --label "traefik.http.middlewares.inject-env-preprod.headers.customrequestheaders.X-App-Env=preprod" \
            --label "traefik.http.middlewares.inject-env-preprod.headers.customrequestheaders.X-Show-Banner=true" \
            --label "traefik.http.middlewares.inject-env-preprod.headers.customrequestheaders.X-Debug-Enabled=true" \
            --label "traefik.http.services.swisscontract-preprod.loadbalancer.server.port=3000" \
            "$IMAGE"

          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(docker exec swisscontract-preprod wget -qO- http://localhost:3000/api/health 2>/dev/null || true)
            echo "$STATUS" | grep -q '"ok"' && echo "Healthy ✅" && break
            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

          # Remove unused swisscontract images — keep only those referenced by running containers
          IN_USE=$(docker ps -q | xargs -r docker inspect --format '{{.Image}}' | sort -u)
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' \
            | grep 'vikramgorla/swisscontract-ai' \
            | while read tag id; do
              if echo "$IN_USE" | grep -q "$id"; then
                echo "KEEP (in use): $tag"
              else
                echo "REMOVE: $tag"
                docker rmi "$tag" 2>/dev/null || true
              fi
            done
          docker image prune -f
          df -h / | tail -1
          ENDSSH

      - name: External health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health" --max-time 20)
          echo "https://${DOMAIN}/api/health → HTTP ${HTTP}"
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ Preprod deployment complete"

      - name: Check security headers
        continue-on-error: true
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          echo "Checking security headers for https://${DOMAIN}..."
          HEADERS=$(curl -sI "https://${DOMAIN}" --max-time 30 || true)

          check_header() {
            if echo "$HEADERS" | grep -qi "$1"; then
              echo "✅ $1 present"
            else
              echo "⚠️  $1 MISSING"
            fi
          }

          check_header "X-Content-Type-Options"
          check_header "X-Frame-Options"
          check_header "Strict-Transport-Security"
          check_header "Referrer-Policy"
          check_header "X-XSS-Protection"

          echo "ℹ️  Security headers check complete (advisory only)"

  promote-production:
    # Runs ONLY on main push — strips beta suffix, re-tags image, deploys, creates release, syncs preprod
    # Skips auto-release commits to avoid infinite loop
    runs-on: ubuntu-latest
    environment: production
    if: "github.ref_name == 'main' && !startsWith(github.event.head_commit.message, 'chore: release')"
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(jq -r .version package.json)
          RELEASE_VERSION=$(echo "$CURRENT" | sed 's/-[a-z]*\.[0-9]*$//')
          TAG="v${RELEASE_VERSION}"

          # If tag already exists, bump patch until we find an unused one
          while gh release view "$TAG" &>/dev/null; do
            echo "⚠️  Tag $TAG already exists, bumping..."
            PATCH=$(echo "$RELEASE_VERSION" | grep -oE '[0-9]+$')
            BASE=$(echo "$RELEASE_VERSION" | sed 's/\.[0-9]*$//')
            RELEASE_VERSION="${BASE}.$((PATCH + 1))"
            TAG="v${RELEASE_VERSION}"
          done

          # Update package.json with clean version
          jq --arg v "$RELEASE_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

          echo "Version: $CURRENT → $RELEASE_VERSION (tag: $TAG)"
          echo "new_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to production
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          docker pull ghcr.io/vikramgorla/swisscontract-ai:preprod
          docker tag ghcr.io/vikramgorla/swisscontract-ai:preprod \
                     ghcr.io/vikramgorla/swisscontract-ai:production
          docker tag ghcr.io/vikramgorla/swisscontract-ai:preprod \
                     ghcr.io/vikramgorla/swisscontract-ai:v${VERSION}
          docker push ghcr.io/vikramgorla/swisscontract-ai:production
          docker push ghcr.io/vikramgorla/swisscontract-ai:v${VERSION}
          echo "✅ Promoted: preprod → production + v${VERSION}"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy production to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
          INFOMANIAK_AI_TOKEN: ${{ secrets.INFOMANIAK_AI_TOKEN }}
          INFOMANIAK_AI_PRODUCT_ID: ${{ secrets.INFOMANIAK_AI_PRODUCT_ID }}
          GITHUB_TOKEN_FOR_DOCKER: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh "$USER@$HOST" \
            DOMAIN="$DOMAIN" \
            INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            GITHUB_TOKEN_FOR_DOCKER="$GITHUB_TOKEN_FOR_DOCKER" \
            GITHUB_ACTOR="$GITHUB_ACTOR" \
            bash << 'ENDSSH'
          set -e
          IMAGE="ghcr.io/vikramgorla/swisscontract-ai:production"

          echo "$GITHUB_TOKEN_FOR_DOCKER" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          docker pull "$IMAGE"

          docker stop swisscontract-production 2>/dev/null || true
          docker rm   swisscontract-production 2>/dev/null || true

          docker network create traefik-net 2>/dev/null || true

          docker run -d \
            --name swisscontract-production \
            --restart unless-stopped \
            --network traefik-net \
            -e INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            -e INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            -e APP_ENV=production \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.swisscontract-production.rule=Host(\`${DOMAIN}\`)" \
            --label "traefik.http.routers.swisscontract-production.entrypoints=websecure" \
            --label "traefik.http.routers.swisscontract-production.tls.certresolver=letsencrypt" \
            --label "traefik.http.routers.swisscontract-production.middlewares=inject-env-production" \
            --label "traefik.http.middlewares.inject-env-production.headers.customrequestheaders.X-App-Env=production" \
            --label "traefik.http.services.swisscontract-production.loadbalancer.server.port=3000" \
            "$IMAGE"

          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(docker exec swisscontract-production wget -qO- http://localhost:3000/api/health 2>/dev/null || true)
            echo "$STATUS" | grep -q '"ok"' && echo "Healthy ✅" && break
            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

          # Remove unused swisscontract images — keep only those referenced by running containers
          IN_USE=$(docker ps -q | xargs -r docker inspect --format '{{.Image}}' | sort -u)
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' \
            | grep 'vikramgorla/swisscontract-ai' \
            | while read tag id; do
              if echo "$IN_USE" | grep -q "$id"; then
                echo "KEEP (in use): $tag"
              else
                echo "REMOVE: $tag"
                docker rmi "$tag" 2>/dev/null || true
              fi
            done
          docker image prune -f
          df -h / | tail -1
          ENDSSH

      - name: External health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health" --max-time 20)
          echo "https://${DOMAIN}/api/health → HTTP ${HTTP}"
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ Production deployment complete"

      - name: Check security headers
        continue-on-error: true
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          echo "Checking security headers for https://${DOMAIN}..."
          HEADERS=$(curl -sI "https://${DOMAIN}" --max-time 30 || true)

          check_header() {
            if echo "$HEADERS" | grep -qi "$1"; then
              echo "✅ $1 present"
            else
              echo "⚠️  $1 MISSING"
            fi
          }

          check_header "X-Content-Type-Options"
          check_header "X-Frame-Options"
          check_header "Strict-Transport-Security"
          check_header "Referrer-Policy"
          check_header "X-XSS-Protection"

          echo "ℹ️  Security headers check complete (advisory only)"

      - name: Create git tag and GitHub release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          printf '## %s\n\n### Container images\n\n```\nghcr.io/vikramgorla/swisscontract-ai:%s\nghcr.io/vikramgorla/swisscontract-ai:production\n```\n' "$TAG" "$TAG" > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --target main
          echo "✅ Release $TAG created"

      - name: Merge main into preprod
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          REMOTE="https://x-access-token:${GH_PAT}@github.com/vikramgorla/swisscontract-ai.git"

          git config user.email "268332783+agent-lea[bot]@users.noreply.github.com"
          git config user.name "Agent Léa 🏔️"

          # Fetch preprod and merge main into it
          git fetch "$REMOTE" preprod:preprod
          git checkout preprod

          # Merge main — accept main's version for package.json conflicts
          git merge origin/main --no-edit -X theirs || true
          
          # Set next dev version
          PATCH=$(echo "$VERSION" | grep -oE '[0-9]+$')
          BASE=$(echo "$VERSION" | sed 's/\.[0-9]*$//')
          NEXT="${BASE}.$((PATCH + 1))-beta.0"
          jq --arg v "$NEXT" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          git add package.json
          git commit -m "chore: start v${BASE}.$((PATCH + 1)) dev cycle" || true

          git push "$REMOTE" preprod
          echo "✅ preprod merged from main + next dev: $NEXT"
