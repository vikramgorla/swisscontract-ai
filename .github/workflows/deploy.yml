name: Deploy

on:
  push:
    branches: [main, preprod]
    paths:
      - 'app/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'postcss.config.mjs'
      - 'proxy.ts'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  packages: write

jobs:
  build:
    # Build runs ONLY on preprod push — produces a single image
    # On main push, we skip build and promote the existing preprod image
    runs-on: ubuntu-latest
    if: github.ref_name == 'preprod'
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "Building image: ghcr.io/vikramgorla/swisscontract-ai:sha-${SHA_SHORT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vikramgorla/swisscontract-ai:preprod
            ghcr.io/vikramgorla/swisscontract-ai:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy-preprod:
    needs: build
    runs-on: ubuntu-latest
    environment: preprod
    if: github.ref_name == 'preprod'
    timeout-minutes: 15

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy preprod to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
          INFOMANIAK_AI_TOKEN: ${{ secrets.INFOMANIAK_AI_TOKEN }}
          INFOMANIAK_AI_PRODUCT_ID: ${{ secrets.INFOMANIAK_AI_PRODUCT_ID }}
          GITHUB_TOKEN_FOR_DOCKER: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SHA_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh "$USER@$HOST" \
            DOMAIN="$DOMAIN" \
            INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            GITHUB_TOKEN_FOR_DOCKER="$GITHUB_TOKEN_FOR_DOCKER" \
            GITHUB_ACTOR="$GITHUB_ACTOR" \
            SHA_TAG="$SHA_TAG" \
            bash << 'ENDSSH'
          set -e
          IMAGE="ghcr.io/vikramgorla/swisscontract-ai:${SHA_TAG}"

          echo "$GITHUB_TOKEN_FOR_DOCKER" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          docker pull "$IMAGE"

          docker stop swisscontract-preprod 2>/dev/null || true
          docker rm   swisscontract-preprod 2>/dev/null || true

          docker network create traefik-net 2>/dev/null || true

          docker run -d \
            --name swisscontract-preprod \
            --restart unless-stopped \
            --network traefik-net \
            -e INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            -e INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            -e APP_ENV=preprod \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.swisscontract-preprod.rule=Host(\`${DOMAIN}\`)" \
            --label "traefik.http.routers.swisscontract-preprod.entrypoints=websecure" \
            --label "traefik.http.routers.swisscontract-preprod.tls.certresolver=letsencrypt" \
            --label "traefik.http.routers.swisscontract-preprod.middlewares=inject-env-preprod" \
            --label "traefik.http.middlewares.inject-env-preprod.headers.customrequestheaders.X-App-Env=preprod" \
            --label "traefik.http.middlewares.inject-env-preprod.headers.customrequestheaders.X-Show-Banner=true" \
            --label "traefik.http.middlewares.inject-env-preprod.headers.customrequestheaders.X-Debug-Enabled=true" \
            --label "traefik.http.services.swisscontract-preprod.loadbalancer.server.port=3000" \
            "$IMAGE"

          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(docker exec swisscontract-preprod wget -qO- http://localhost:3000/api/health 2>/dev/null || true)
            echo "$STATUS" | grep -q '"ok"' && echo "Healthy ✅" && break
            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

          docker image prune -f
          ENDSSH

      - name: External health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health" --max-time 20)
          echo "https://${DOMAIN}/api/health → HTTP ${HTTP}"
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ Preprod deployment complete"

  promote-production:
    # Runs ONLY on main push — bumps version, re-tags image, deploys, creates release, syncs preprod
    runs-on: ubuntu-latest
    environment: production
    if: github.ref_name == 'main'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qiE '^feat!:|BREAKING CHANGE'; then
            BUMP=major
          elif echo "$COMMIT_MSG" | grep -qiE '^feat(\(.+\))?(\!)?:'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "Bump type: $BUMP"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        id: version
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "Version: $CURRENT → $NEW_VERSION"
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Promote image to production
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          docker pull ghcr.io/vikramgorla/swisscontract-ai:preprod
          docker tag ghcr.io/vikramgorla/swisscontract-ai:preprod \
                     ghcr.io/vikramgorla/swisscontract-ai:production
          docker tag ghcr.io/vikramgorla/swisscontract-ai:preprod \
                     ghcr.io/vikramgorla/swisscontract-ai:v${VERSION}
          docker push ghcr.io/vikramgorla/swisscontract-ai:production
          docker push ghcr.io/vikramgorla/swisscontract-ai:v${VERSION}
          echo "✅ Promoted: preprod → production + v${VERSION}"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy production to VPS
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
          INFOMANIAK_AI_TOKEN: ${{ secrets.INFOMANIAK_AI_TOKEN }}
          INFOMANIAK_AI_PRODUCT_ID: ${{ secrets.INFOMANIAK_AI_PRODUCT_ID }}
          GITHUB_TOKEN_FOR_DOCKER: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh "$USER@$HOST" \
            DOMAIN="$DOMAIN" \
            INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            GITHUB_TOKEN_FOR_DOCKER="$GITHUB_TOKEN_FOR_DOCKER" \
            GITHUB_ACTOR="$GITHUB_ACTOR" \
            bash << 'ENDSSH'
          set -e
          IMAGE="ghcr.io/vikramgorla/swisscontract-ai:production"

          echo "$GITHUB_TOKEN_FOR_DOCKER" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          docker pull "$IMAGE"

          docker stop swisscontract-production 2>/dev/null || true
          docker rm   swisscontract-production 2>/dev/null || true

          docker network create traefik-net 2>/dev/null || true

          docker run -d \
            --name swisscontract-production \
            --restart unless-stopped \
            --network traefik-net \
            -e INFOMANIAK_AI_TOKEN="$INFOMANIAK_AI_TOKEN" \
            -e INFOMANIAK_AI_PRODUCT_ID="$INFOMANIAK_AI_PRODUCT_ID" \
            -e APP_ENV=production \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.swisscontract-production.rule=Host(\`${DOMAIN}\`)" \
            --label "traefik.http.routers.swisscontract-production.entrypoints=websecure" \
            --label "traefik.http.routers.swisscontract-production.tls.certresolver=letsencrypt" \
            --label "traefik.http.routers.swisscontract-production.middlewares=inject-env-production" \
            --label "traefik.http.middlewares.inject-env-production.headers.customrequestheaders.X-App-Env=production" \
            --label "traefik.http.services.swisscontract-production.loadbalancer.server.port=3000" \
            "$IMAGE"

          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(docker exec swisscontract-production wget -qO- http://localhost:3000/api/health 2>/dev/null || true)
            echo "$STATUS" | grep -q '"ok"' && echo "Healthy ✅" && break
            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

          docker image prune -f
          ENDSSH

      - name: External health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health" --max-time 20)
          echo "https://${DOMAIN}/api/health → HTTP ${HTTP}"
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ Production deployment complete"

      - name: Commit version bump and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          TAG="${{ steps.version.outputs.tag }}"

          git config user.email "vikram.gorla@gmail.com"
          git config user.name "Vikram Gorla"
          git add package.json
          git commit -m "chore: release ${TAG}" -m "Written by Léa 🏔️"
          git push origin main

          printf '## %s\n\n### Container images\n\n```\nghcr.io/vikramgorla/swisscontract-ai:%s\nghcr.io/vikramgorla/swisscontract-ai:production\n```\n' "$TAG" "$TAG" > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --target main

      - name: Sync preprod to main
        run: |
          git fetch origin
          git checkout preprod
          git reset --hard origin/main
          git push origin preprod --force-with-lease
