name: Deploy to preprod (Docker)

on:
  push:
    branches: [preprod]
    paths:
      - 'app/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'postcss.config.mjs'
      - 'proxy.ts'
      - 'Dockerfile'
      - '.github/workflows/deploy-preprod.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: preprod
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/vikramgorla/swisscontract-ai:preprod
          build-args: |
            NEXT_PUBLIC_ENV=preprod

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          IMAGE: ghcr.io/vikramgorla/swisscontract-ai:preprod
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key $USER@$HOST bash << 'ENDSSH'
          set -e

          IMAGE="ghcr.io/vikramgorla/swisscontract-ai:preprod"

          echo "=== Pulling image ==="
          docker pull $IMAGE

          echo "=== Stopping old container ==="
          docker stop swisscontract 2>/dev/null || true
          docker rm swisscontract 2>/dev/null || true

          echo "=== Starting new container ==="
          docker run -d \
            --name swisscontract \
            --restart unless-stopped \
            -p 3000:3000 \
            --env-file /app/.env.local \
            -e NODE_ENV=production \
            $IMAGE

          echo "=== Waiting for startup ==="
          sleep 8
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ --max-time 5 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "Container is up (HTTP $HTTP)"
              break
            fi
            echo "Waiting... attempt $i (HTTP $HTTP)"
            sleep 5
          done
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://preprod.swisscontract.ai/" --max-time 20)
          echo "preprod.swisscontract.ai → HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: returned $HTTP"
            exit 1
          fi
          echo "Health check passed ✅"
