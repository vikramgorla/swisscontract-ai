version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "preprod"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "preprod"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "ci"
    ignore:
      # Don't auto-update major versions — CI action majors can break workflows
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
