<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="6" fill="#DC2626"/>

  <!-- Brand name -->
  <text x="600" y="270"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="86" font-weight="800" fill="#111827" letter-spacing="-2">swisscontract<tspan fill="#DC2626">.ai</tspan></text>

  <!-- Tagline -->
  <text x="600" y="340"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="500" fill="#6B7280">Understand any Swiss contract in seconds</text>

  <!-- Divider -->
  <line x1="500" y1="378" x2="700" y2="378" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Trust badges -->
  <rect x="248" y="400" width="188" height="38" rx="19" fill="#FEF2F2"/>
  <text x="342" y="424"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="15" font-weight="600" fill="#DC2626">Free to use</text>

  <rect x="456" y="400" width="188" height="38" rx="19" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="550" y="424"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="15" font-weight="600" fill="#374151">Nothing stored</text>

  <rect x="664" y="400" width="210" height="38" rx="19" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="769" y="424"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="15" font-weight="600" fill="#374151">No account needed</text>

  <!-- Footer -->
  <text x="600" y="570"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="17" fill="#9CA3AF">AI-powered · Built in Switzerland</text>

  <!-- Swiss cross — subtle, bottom right -->
  <rect x="1110" y="530" width="52" height="52" rx="6" fill="#DC2626" opacity="0.07"/>
  <rect x="1133" y="538" width="8" height="36" rx="2" fill="#DC2626" opacity="0.25"/>
  <rect x="1118" y="553" width="36" height="8" rx="2" fill="#DC2626" opacity="0.25"/>
</svg>
